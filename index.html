<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&M Otthonfelújítás</title>

    <style>
        * { box-sizing: border-box; margin:0; padding:0; font-family: Arial, sans-serif; }
        body { line-height:1.6; background-color:#f8f8f8; color:#333; display:flex; flex-direction:column; min-height:100vh; }
        a { text-decoration:none; color:#333; }

        /* ===== FEJLÉC (STICKY) ===== */
        header {
            background-color: #ff6f3c;
            color: white;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        header.scrolled {
            padding: 10px 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        header h1 {
            text-align:center;
            font-size:2.5em;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        header.scrolled h1 {
            font-size:1.8em;
        }

        nav {
            text-align:center;
            margin-top:10px;
        }

        nav a {
            margin: 0 15px;
            font-weight:bold;
            color:white;
            transition: 0.3s;
        }

        nav a:hover {
            text-decoration:underline;
            color: #fff9f0;
        }

        main {
            flex: 1;
        }

        section {
            padding: 60px 20px;
            max-width:1000px;
            margin:auto;
        }

        /* Anchor fix sticky miatt */
        section:target {
            scroll-margin-top: 120px;
        }

        h2 {
            text-align:center;
            margin-bottom:40px;
            color:#fff;
            background: linear-gradient(135deg, rgba(255,111,60,0.9), rgba(255,166,121,0.9));
            display:inline-block;
            padding: 12px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ===== HERO ===== */
        .hero {
            text-align:center;
            padding:100px 20px;
            background-color:#fff5f0;
            border-radius:10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hero p {
            font-size:1.2em;
            margin-top:20px;
        }

        .hero a {
            display:inline-block;
            margin-top:30px;
            background:#ff6f3c;
            color:white;
            padding:15px 30px;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .hero a:hover {
            background:#ff3f0c;
            transform: scale(1.05);
        }

        /* ===== SZOLGÁLTATÁSOK ===== */
        .services {
            display:flex;
            flex-wrap:wrap;
            justify-content:space-around;
            gap:20px;
        }

        .service-box {
            background-color:#fff2e6;
            padding:20px;
            flex:1 1 250px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.15);
            text-align:center;
            transition: 0.3s;
        }

        .service-box:hover {
            transform: translateY(-5px);
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, rgba(255,111,60,0.85), rgba(255,200,150,0.85));
        }

        /* ===== KAPCSOLAT ===== */
        .contact-form {
            max-width:600px;
            margin:auto;
            background: rgba(255, 111, 60, 0.1);
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(255, 111, 60, 0.2);
        }

        .contact-form input,
        .contact-form textarea {
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border-radius:5px;
            border:1px solid #ccc;
            font-size:1em;
        }

        .contact-form button {
            background-color:#ff6f3c;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:1em;
            border-radius:5px;
            cursor:pointer;
            transition:0.3s;
        }

        .contact-form button:hover {
            background-color:#ff3f0c;
            transform: scale(1.05);
        }

        /* ===== ELÉRHETŐSÉG ===== */
        .contact-info {
            text-align:center;
            margin-top:30px;
            line-height:1.8;
            background: rgba(255, 111, 60, 0.1);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(255, 111, 60, 0.2);
            max-width:600px;
            margin-left:auto;
            margin-right:auto;
            font-weight:600;
            color:#4a2a00;
        }

        /* ===== LÁBLÉC ===== */
        .footer {
            background-color:#222;
            color:white;
            padding:20px;
            font-size:0.9em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .footer a {
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .footer-center {
            text-align: center;
            flex: 1;
        }

        @media(max-width:768px){
            .services {
                flex-direction:column;
                align-items:center;
            }
            #about, .contact-form, .contact-info {
                margin: 20px 10px 0 10px;
            }
        }

        @media (max-width: 600px) {
            .footer {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }

        #about {
            background: rgba(255, 111, 60, 0.1);
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(255, 111, 60, 0.2);
            color: #4a2a00;
            max-width: 900px;
            margin: 20px auto 0 auto;
            font-weight: 600;
            line-height: 1.5;
        }

        #form-message.success { color: green; font-weight: bold; }
        #form-message.error { color: red; font-weight: bold; }
    </style>
</head>

<body>

<header id="mainHeader">
    <h1>M&M Otthonfelújítás</h1>
    <nav>
        <a href="#home">Főoldal</a>
        <a href="#about">Rólunk</a>
        <a href="#services">Szolgáltatások</a>
        <a href="referenciak.html">Referenciák</a>
        <a href="#contact">Kapcsolat</a>
    </nav>
</header>
